<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ackordsrecept</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #05060f;
    --bg2: #0b0d1f;
    --surface: rgba(255,255,255,0.04);
    --border: rgba(255,255,255,0.08);
    --text: #dde0f5;
    --muted: #666880;
    --gold: #ffc94d;
    --gold-dim: rgba(255,201,77,0.15);
    --radius: 12px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Starfield ── */
  #stars {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }

  .content {
    position: relative;
    z-index: 1;
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 20px 60px;
  }

  /* ── Header ── */
  header {
    text-align: center;
    padding: 40px 20px 10px;
  }

  header h1 {
    font-size: clamp(1.8rem, 5vw, 3rem);
    font-weight: 300;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #fff;
  }

  header h1 em {
    font-style: normal;
    color: var(--gold);
    font-weight: 700;
  }

  header p {
    color: var(--muted);
    font-size: 0.85rem;
    margin-top: 8px;
    letter-spacing: 0.05em;
  }

  /* ── Type cards ── */
  .type-row {
    display: flex;
    justify-content: center;
    gap: 10px;
    padding: 30px 0 10px;
    flex-wrap: wrap;
  }

  .type-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 20px;
    min-width: 140px;
    text-align: center;
    cursor: pointer;
    transition: all 0.25s ease;
    user-select: none;
  }

  .type-card:hover {
    background: rgba(255,255,255,0.07);
    border-color: rgba(255,255,255,0.18);
    transform: translateY(-2px);
  }

  .type-card.active {
    background: var(--gold-dim);
    border-color: rgba(255,201,77,0.5);
  }

  .type-card .num {
    font-family: 'Space Mono', monospace;
    font-size: 1.4rem;
    font-weight: 700;
    color: var(--gold);
    line-height: 1;
  }

  .type-card .label {
    font-size: 0.72rem;
    color: var(--muted);
    margin-top: 5px;
    letter-spacing: 0.06em;
  }

  .type-card .sublabel {
    font-size: 0.78rem;
    color: var(--text);
    margin-top: 3px;
  }

  .type-card.active .label { color: rgba(255,201,77,0.7); }
  .type-card.active .sublabel { color: #fff; }

  /* ── Description ── */
  .desc {
    text-align: center;
    max-width: 560px;
    margin: 16px auto 30px;
    padding: 0 16px;
    color: var(--muted);
    font-size: 0.875rem;
    line-height: 1.7;
    min-height: 48px;
    transition: opacity 0.3s;
  }

  /* ── Divider ── */
  .divider {
    width: 60px;
    height: 1px;
    background: var(--border);
    margin: 0 auto 30px;
  }

  /* ── Main layout ── */
  .main {
    display: flex;
    gap: 30px;
    align-items: flex-start;
    justify-content: center;
    flex-wrap: wrap;
  }

  /* ── Canvas wrap ── */
  .canvas-wrap {
    flex-shrink: 0;
    position: relative;
  }

  canvas {
    display: block;
    border-radius: 50%;
  }

  /* ── Chord panel ── */
  .chord-panel {
    flex: 1;
    min-width: 240px;
    max-width: 320px;
  }

  .panel-title {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--muted);
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 12px;
  }

  .chord-btn {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    margin-bottom: 6px;
    cursor: pointer;
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 0.875rem;
    transition: all 0.18s;
    text-align: left;
  }

  .chord-btn:hover {
    background: rgba(255,255,255,0.07);
    border-color: rgba(255,255,255,0.16);
  }

  .chord-btn.active {
    background: var(--gold-dim);
    border-color: rgba(255,201,77,0.45);
    color: #fff;
  }

  .chord-btn .sym {
    font-family: 'Space Mono', monospace;
    font-size: 0.82rem;
    color: var(--gold);
    min-width: 60px;
    flex-shrink: 0;
  }

  .chord-btn.active .sym { color: var(--gold); }

  .chord-btn .cname {
    flex: 1;
  }

  .chord-btn .dots {
    display: flex;
    gap: 3px;
    align-items: center;
    flex-shrink: 0;
  }

  .dot-sm {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    display: inline-block;
    flex-shrink: 0;
  }

  .empty-state {
    text-align: center;
    color: var(--muted);
    font-size: 0.85rem;
    padding: 40px 20px;
    line-height: 1.6;
  }

  .empty-state span {
    font-size: 1.5rem;
    display: block;
    margin-bottom: 12px;
    opacity: 0.4;
  }

  /* ── Legend ── */
  .legend {
    margin-top: 24px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
  }

  .legend-title {
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--muted);
    margin-bottom: 10px;
  }

  .legend-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 5px 14px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 0.73rem;
    color: var(--muted);
  }

  .legend-dot {
    width: 9px;
    height: 9px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* ── Responsive ── */
  @media (max-width: 700px) {
    .main { flex-direction: column; align-items: center; }
    .chord-panel { max-width: 100%; width: 100%; }
    canvas { width: 300px !important; height: 300px !important; }
  }
</style>
</head>
<body>

<canvas id="stars"></canvas>

<div class="content">

  <header>
    <h1>Ackords<em>recept</em></h1>
    <p>Skapad av Richard Hauer &amp; Claude &nbsp;·&nbsp; välj klangtyp &amp; ackord</p>
  </header>

  <div class="type-row" id="typeRow"></div>

  <div class="desc" id="desc">Välj en ackordstyp ovan för att komma igång.</div>
  <div class="divider"></div>

  <div class="main">
    <div class="canvas-wrap">
      <canvas id="solar" width="420" height="420"></canvas>
    </div>

    <div class="chord-panel">
      <div class="panel-title" id="panelTitle">Ackordstyp</div>
      <div id="chordList">
        <div class="empty-state">
          <span>☀</span>
          Välj en ackordstyp ovan för att se tillgängliga ackord.
        </div>
      </div>
      <div class="legend" id="legend" style="display:none"></div>
    </div>
  </div>

</div>

<script>
// ═══════════════════════════════════════════════════════
// DATA
// ═══════════════════════════════════════════════════════

const KLANG = {
  '3': {
    name: '3-klang', sub: 'Treklang',
    desc: 'Treklanger är harmonikens grundstenar och spelas vanligtvis som dur- eller mollackord. Även diminished, augmented och sus-varianter hör till denna familj.',
    chords: [
      { name: 'Dur',        sym: 'M',    iv: [0,4,7] },
      { name: 'Moll',       sym: 'm',    iv: [0,3,7] },
      { name: 'Diminished', sym: 'dim',  iv: [0,3,6] },
      { name: 'Augmented',  sym: 'aug',  iv: [0,4,8] },
      { name: 'Sus 2',      sym: 'sus2', iv: [0,2,7] },
      { name: 'Sus 4',      sym: 'sus4', iv: [0,5,7] },
    ]
  },
  '4': {
    name: '4-klang', sub: 'Sjundackord',
    desc: '4-klanger spelas vanligtvis som 7-ackord. Septimatonen ger ackordet mer harmonisk färg och karaktär – från lys dominant7 till mörk diminished7.',
    chords: [
      { name: 'Dominant 7',   sym: '7',      iv: [0,4,7,10] },
      { name: 'Major 7',      sym: 'maj7',   iv: [0,4,7,11] },
      { name: 'Minor 7',      sym: 'm7',     iv: [0,3,7,10] },
      { name: 'Minor maj7',   sym: 'mΔ7',    iv: [0,3,7,11] },
      { name: 'Half-dim ø7',  sym: 'ø7',     iv: [0,3,6,10] },
      { name: 'Diminished 7', sym: 'dim7',   iv: [0,3,6,9]  },
      { name: 'Augmented 7',  sym: 'aug7',   iv: [0,4,8,10] },
      { name: '7 sus4',       sym: '7sus4',  iv: [0,5,7,10] },
    ]
  },
  '5': {
    name: '5-klang', sub: 'Niondackord',
    desc: '5-klanger spelas vanligtvis som 9-ackord. Nonan lägger till ett extra lager harmonisk rikedom. Undantag finns t.ex. 7b9 och 7#11.',
    chords: [
      { name: 'Major 9',      sym: 'maj9',   iv: [0,4,7,11,2] },
      { name: 'Dominant 9',   sym: '9',      iv: [0,4,7,10,2] },
      { name: 'Minor 9',      sym: 'm9',     iv: [0,3,7,10,2] },
      { name: '7 b9',         sym: '7b9',    iv: [0,4,7,10,1] },
      { name: '7 #9',         sym: '7#9',    iv: [0,4,7,10,3] },
      { name: 'Minor maj9',   sym: 'mΔ9',    iv: [0,3,7,11,2] },
      { name: 'Lydisk dom',   sym: '7#11',   iv: [0,4,7,10,6] },
      { name: 'Altered dom',  sym: '7alt',   iv: [0,4,8,10,1] },
    ]
  },
  '6': {
    name: '6-klang', sub: 'Elvaackord',
    desc: '6-klanger kallas vanligtvis 11-ackord. Med sex toner täcks ett brett harmoniskt spektrum. Undantag och varianter är rikliga – speciellt i jazz!',
    chords: [
      { name: 'Major 11',     sym: 'maj11',    iv: [0,4,7,11,2,5] },
      { name: 'Dominant 11',  sym: '11',       iv: [0,4,7,10,2,5] },
      { name: 'Minor 11',     sym: 'm11',      iv: [0,3,7,10,2,5] },
      { name: 'maj7 #11',     sym: 'Δ7#11',    iv: [0,4,7,11,2,6] },
      { name: '9 #11',        sym: '9#11',     iv: [0,4,7,10,2,6] },
      { name: 'Minor 11b5',   sym: 'm11b5',    iv: [0,3,6,10,2,5] },
    ]
  },
  '7': {
    name: '7-klang', sub: 'Trettondackord',
    desc: '7-klanger är trettondackord – det fullständiga harmoniska spektrumet! Alla sju skalsteg representerade. Det ultimata jazzackordet.',
    chords: [
      { name: 'Major 13',     sym: 'maj13',    iv: [0,4,7,11,2,5,9] },
      { name: 'Dominant 13',  sym: '13',       iv: [0,4,7,10,2,5,9] },
      { name: 'Minor 13',     sym: 'm13',      iv: [0,3,7,10,2,5,9] },
      { name: '13 b9',        sym: '13b9',     iv: [0,4,7,10,1,5,9] },
      { name: '13 #11',       sym: '13#11',    iv: [0,4,7,10,2,6,9] },
      { name: 'Minor 13b5',   sym: 'm13b5',    iv: [0,3,6,10,2,5,9] },
    ]
  }
};

// 12 colors for the 12 chromatic positions (semitone 1-12 from root)
const PCOLORS = [
  '#FF00CC', // b9  – 1 halvton  – magenta
  '#FF1500', // 9   – 2 halvtoner – röd
  '#FF7700', // b3  – 3 halvtoner – orange
  '#FFDD00', // 3   – 4 halvtoner – gul
  '#AAFF00', // 4   – 5 halvtoner – lime
  '#00FF55', // b5  – 6 halvtoner – grön
  '#00FFAA', // 5   – 7 halvtoner – mintgrön
  '#00EEFF', // b6  – 8 halvtoner – cyan
  '#0099FF', // 6   – 9 halvtoner – himmelsblå
  '#2244FF', // b7  – 10 halvtoner – blå
  '#8800FF', // Δ7  – 11 halvtoner – lila
  '#FF0066', // 8va – 12 halvtoner – rosa
];

const INAMES = ['b9','9','b3','3','4','b5','5','b6','6','b7','Δ7','R1'];
const ILONG  = [
  '1 ht – liten nona','2 ht – stor nona','3 ht – liten ters','4 ht – stor ters',
  '5 ht – kvart','6 ht – triton','7 ht – kvint','8 ht – liten sext',
  '9 ht – stor sext','10 ht – liten sept.','11 ht – stor sept.','12 ht – oktav'
];

// ═══════════════════════════════════════════════════════
// STARFIELD
// ═══════════════════════════════════════════════════════

(function() {
  const sc = document.getElementById('stars');
  const stx = sc.getContext('2d');
  function resize() { sc.width = window.innerWidth; sc.height = window.innerHeight; drawStars(); }
  function drawStars() {
    stx.clearRect(0,0,sc.width,sc.height);
    const rng = mulberry32(42);
    for (let i = 0; i < 220; i++) {
      const x = rng() * sc.width;
      const y = rng() * sc.height;
      const r = rng() * 1.2 + 0.2;
      const a = rng() * 0.5 + 0.1;
      stx.fillStyle = `rgba(255,255,255,${a})`;
      stx.beginPath(); stx.arc(x,y,r,0,Math.PI*2); stx.fill();
    }
  }
  function mulberry32(seed) {
    return function() { seed |= 0; seed = seed + 0x6D2B79F5 | 0;
      let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
      t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
      return ((t ^ t >>> 14) >>> 0) / 4294967296; };
  }
  window.addEventListener('resize', resize);
  resize();
})();

// ═══════════════════════════════════════════════════════
// SOLAR SYSTEM CANVAS
// ═══════════════════════════════════════════════════════

const solar = document.getElementById('solar');
const ctx = solar.getContext('2d');
const CX = solar.width / 2;
const CY = solar.height / 2;
const OR = 155;  // orbit radius
const SUN_R = 26;
const P_ACTIVE = 17;
const P_INACTIVE = 9;

let selectedChord = null;
let activeSet = new Set();

function isActive(semi) {
  // semi = 1..12
  if (!selectedChord) return false;
  if (semi === 12) return true; // octave always resonates
  return selectedChord.iv.includes(semi);
}

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return {r,g,b};
}

function lighter(hex, amt) {
  const {r,g,b} = hexToRgb(hex);
  return `rgb(${Math.min(255,r+amt)},${Math.min(255,g+amt)},${Math.min(255,b+amt)})`;
}

function drawSun() {
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  if (selectedChord) {
    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 28px Space Mono, monospace';
    ctx.fillText(selectedChord.sym, CX, CY - 8);
    ctx.font = '14px Space Grotesk, sans-serif';
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.fillText(selectedChord.name, CX, CY + 18);
  }
}

function drawOrbit() {
  ctx.save();
  ctx.strokeStyle = 'rgba(255,255,255,0.06)';
  ctx.lineWidth = 1;
  ctx.setLineDash([3,9]);
  ctx.beginPath(); ctx.arc(CX,CY,OR,0,Math.PI*2); ctx.stroke();
  ctx.setLineDash([]);
  ctx.restore();
}

function drawPlanet(i, angle) {
  const semi = i + 1; // 1..12
  const active = isActive(semi);
  const noChord = selectedChord === null;
  const px = CX + Math.cos(angle) * OR;
  const py = CY + Math.sin(angle) * OR;
  const col = PCOLORS[i];
  const r = active ? P_ACTIVE : P_INACTIVE;
  const alpha = active ? 1.0 : (noChord ? 0.55 : 0.15);

  ctx.save();
  ctx.globalAlpha = alpha;

  // glow halo for active
  if (active) {
    const t = Date.now() / 1000;
    const pulse = 0.85 + 0.15 * Math.sin(t * 3 + i * 0.8);
    const {r:cr,g:cg,b:cb} = hexToRgb(col);
    let grd = ctx.createRadialGradient(px,py,1,px,py,r*3*pulse);
    grd.addColorStop(0,`rgba(${cr},${cg},${cb},0.55)`);
    grd.addColorStop(0.5,`rgba(${cr},${cg},${cb},0.2)`);
    grd.addColorStop(1,`rgba(${cr},${cg},${cb},0)`);
    ctx.globalAlpha = 1;
    ctx.fillStyle = grd;
    ctx.beginPath(); ctx.arc(px,py,r*3*pulse,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha = alpha;
  }

  // planet body
  let body = ctx.createRadialGradient(px-r*0.3,py-r*0.35,1,px,py,r);
  body.addColorStop(0, lighter(col,70));
  body.addColorStop(0.6, col);
  body.addColorStop(1, lighter(col,-40));
  ctx.fillStyle = body;
  ctx.beginPath(); ctx.arc(px,py,r,0,Math.PI*2); ctx.fill();

  // rim
  ctx.strokeStyle = active ? 'rgba(255,255,255,0.8)' : 'rgba(255,255,255,0.25)';
  ctx.lineWidth = active ? 1.5 : 0.8;
  ctx.stroke();

  ctx.restore();

  // label outside orbit
  const labelR = OR + (active ? 30 : 24);
  const lx = CX + Math.cos(angle) * labelR;
  const ly = CY + Math.sin(angle) * labelR;
  ctx.save();
  ctx.globalAlpha = active ? 1.0 : (noChord ? 0.45 : 0.18);
  ctx.fillStyle = active ? '#fff' : '#9999bb';
  ctx.font = active ? 'bold 11px Space Grotesk, sans-serif' : '10px Space Grotesk, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(INAMES[i], lx, ly);
  ctx.restore();
}

function drawFrame() {
  ctx.clearRect(0,0,solar.width,solar.height);

  // bg
  ctx.fillStyle = '#05060f';
  ctx.fillRect(0,0,solar.width,solar.height);

  // subtle nebula bg
  let neb = ctx.createRadialGradient(CX,CY,20,CX,CY,210);
  neb.addColorStop(0,'rgba(30,20,80,0.5)');
  neb.addColorStop(0.5,'rgba(10,10,40,0.3)');
  neb.addColorStop(1,'rgba(5,6,15,0)');
  ctx.fillStyle = neb;
  ctx.fillRect(0,0,solar.width,solar.height);

  drawOrbit();

  for (let i = 0; i < 12; i++) {
    const baseAngle = -Math.PI/2 + ((i - 11) / 12) * Math.PI * 2;
    const angle = baseAngle;
    drawPlanet(i, angle);
  }

  drawSun();

  requestAnimationFrame(drawFrame);
}

drawFrame();

// ═══════════════════════════════════════════════════════
// UI
// ═══════════════════════════════════════════════════════

let selectedType = null;
let selectedChordBtn = null;

function buildTypeCards() {
  const row = document.getElementById('typeRow');
  row.innerHTML = '';
  Object.entries(KLANG).forEach(([key, t]) => {
    const el = document.createElement('div');
    el.className = 'type-card' + (selectedType === key ? ' active' : '');
    el.innerHTML = `
      <div class="num">${t.name}</div>
      <div class="sublabel">${t.sub}</div>
      <div class="label">${key === '3' ? 'dur · moll' : key==='4'?'7-ackord':key==='5'?'9-ackord':key==='6'?'11-ackord':'13-ackord'}</div>
    `;
    el.onclick = () => selectType(key);
    row.appendChild(el);
  });
}

function selectType(key) {
  selectedType = key;
  selectedChord = null;
  selectedChordBtn = null;
  buildTypeCards();

  const t = KLANG[key];
  document.getElementById('desc').textContent = t.desc;
  document.getElementById('panelTitle').textContent = `${t.name} – välj ackord`;

  const list = document.getElementById('chordList');
  list.innerHTML = '';

  t.chords.forEach(chord => {
    const btn = document.createElement('button');
    btn.className = 'chord-btn';

    const dotsHTML = chord.iv.map(iv => {
      if (iv === 0) return `<span class="dot-sm" style="background:#ffc94d;box-shadow:0 0 3px #ffc94d"></span>`;
      const ci = iv - 1;
      return `<span class="dot-sm" style="background:${PCOLORS[ci]}"></span>`;
    }).join('');

    btn.innerHTML = `
      <span class="sym">${chord.sym}</span>
      <span class="cname">${chord.name}</span>
      <span class="dots">${dotsHTML}</span>
    `;

    btn.onclick = () => {
      if (selectedChord === chord) {
        selectedChord = null;
        btn.classList.remove('active');
        selectedChordBtn = null;
      } else {
        if (selectedChordBtn) selectedChordBtn.classList.remove('active');
        selectedChord = chord;
        btn.classList.add('active');
        selectedChordBtn = btn;
      }
    };

    list.appendChild(btn);
  });

  // Legend
  const leg = document.getElementById('legend');
  leg.style.display = 'block';
  leg.innerHTML = `
    <div class="legend-title">Intervallguide</div>
    <div class="legend-grid">
      <div class="legend-item">
        <span class="legend-dot" style="background:#ffc94d"></span>
        <span>R1 – grundton</span>
      </div>
      ${INAMES.map((n,i) => `
        <div class="legend-item">
          <span class="legend-dot" style="background:${PCOLORS[i]}"></span>
          <span>${n} – ${ILONG[i]}</span>
        </div>
      `).join('')}
    </div>
  `;
}

buildTypeCards();
</script>
