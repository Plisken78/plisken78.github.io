<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Ackordfinnaren / Chord Finder</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Crimson+Pro:ital,wght@0,300;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}

</style>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#111118;color:#e8e6e0;min-height:100vh}
button{font-family:inherit;cursor:pointer}
.app{max-width:900px;margin:0 auto;padding:16px}
.scroll-wrap{overflow-x:auto}
</style>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState} = React;

const ALL_NOTES = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];
const STRING_OPEN = [4,9,2,7,11,4];
const STRING_NAMES = ["E","A","D","G","B","e"];

const CHORD_GROUPS = {
  "Triads": [
    {key:"maj",label:"X",intervals:["1","3","5"]},
    {key:"min",label:"Xm",intervals:["1","b3","5"]},
    {key:"mb5",label:"Xmb5",intervals:["1","b3","b5"]},
    {key:"sus4",label:"Xsus4",intervals:["1","4","5"]},
    {key:"sus9",label:"Xsus9",intervals:["1","9","5"]},
    {key:"aug",label:"Xaug",intervals:["1","3","#5"]},
    {key:"x4",label:"X4",intervals:["1","4","5"]},
  ],
  "4-Chords": [
    {key:"maj7",label:"Xmaj7",intervals:["1","3","5","maj7"]},
    {key:"dom7",label:"X7",intervals:["1","3","5","b7"]},
    {key:"min7",label:"Xm7",intervals:["1","b3","5","b7"]},
    {key:"min7b5",label:"Xm7b5",intervals:["1","b3","b5","b7"]},
    {key:"minmaj7",label:"XmMaj7",intervals:["1","b3","5","maj7"]},
    {key:"maj7s5",label:"Xmaj7#5",intervals:["1","3","#5","maj7"]},
    {key:"maj6",label:"X6",intervals:["1","3","5","6"]},
    {key:"min6",label:"Xm6",intervals:["1","b3","5","6"]},
    {key:"dom7sus4",label:"X7sus4",intervals:["1","4","5","b7"]},
    {key:"dim7",label:"Xdim",intervals:["1","b3","b5","6"]},
    {key:"add9",label:"Xadd9",intervals:["1","3","5","9"]},
    {key:"madd9",label:"Xmadd9",intervals:["1","b3","5","9"]},
  ],
  "5-Chords": [
    {key:"maj9",label:"Xmaj9",intervals:["1","3","5","maj7","9"]},
    {key:"dom9",label:"X9",intervals:["1","3","5","b7","9"]},
    {key:"dom9b5",label:"X9b5",intervals:["1","3","b5","b7","9"]},
    {key:"dom9s5",label:"X9#5",intervals:["1","3","#5","b7","9"]},
    {key:"maj9s5",label:"Xmaj9#5",intervals:["1","3","#5","maj7","9"]},
    {key:"min9",label:"Xm9",intervals:["1","b3","5","b7","9"]},
    {key:"minmaj9",label:"XmMaj9",intervals:["1","b3","5","maj7","9"]},
    {key:"min9b5",label:"Xm9b5",intervals:["1","b3","b5","b7","9"]},
    {key:"dom7b9",label:"X7b9",intervals:["1","3","5","b7","b9"]},
    {key:"dom7s5b9",label:"X7#5b9",intervals:["1","3","#5","b7","b9"]},
    {key:"dom7s5s9",label:"X7#5#9",intervals:["1","3","#5","b7","#9"]},
  ],
};

const IV_COLORS = {
  "1":    {bg:"#ffffff", border:"#bbb",    text:"#111"},
  "b9":   {bg:"#ff4400", border:"#cc3300", text:"#fff"},
  "9":    {bg:"#ff9900", border:"#cc7700", text:"#111"},
  "b3":   {bg:"#ffff00", border:"#cccc00", text:"#111"},
  "#9":   {bg:"#ffff00", border:"#cccc00", text:"#111"},
  "3":    {bg:"#88ff00", border:"#66cc00", text:"#111"},
  "4":    {bg:"#00cc44", border:"#009933", text:"#fff"},
  "11":   {bg:"#00cc44", border:"#009933", text:"#fff"},
  "b5":   {bg:"#00ccff", border:"#00aacc", text:"#111"},
  "#11":  {bg:"#00ccff", border:"#00aacc", text:"#111"},
  "5":    {bg:"#0099ff", border:"#0077cc", text:"#fff"},
  "#5":   {bg:"#0033ff", border:"#0022cc", text:"#fff"},
  "b13":  {bg:"#0033ff", border:"#0022cc", text:"#fff"},
  "6":    {bg:"#6600ff", border:"#4400cc", text:"#fff"},
  "13":   {bg:"#6600ff", border:"#4400cc", text:"#fff"},
  "b7":   {bg:"#bf00ff", border:"#8800cc", text:"#fff"},
  "maj7": {bg:"#ff0080", border:"#cc0066", text:"#fff"},
  "7":    {bg:"#ff0080", border:"#cc0066", text:"#fff"},
};

const SEMI_TO_IV = {0:"1",1:"b9",2:"9",3:"b3",4:"3",5:"4",6:"b5",7:"5",8:"#5",9:"6",10:"b7",11:"maj7"};
const ALIASES = {"#9":"b3","b3":"#9","#5":"b13","b13":"#5","6":"13","13":"6","4":"11","11":"4","b5":"#11","#11":"b5"};

function getNoteAtFret(si,f){return(STRING_OPEN[si]+f)%12;}
function getIV(noteIdx,rootIdx){return SEMI_TO_IV[(noteIdx-rootIdx+12)%12];}
function matchIV(iv,activeSet){
  if(activeSet.has(iv))return iv;
  const alt=ALIASES[iv];
  if(alt&&activeSet.has(alt))return alt;
  return null;
}

const FRET_MARKERS=[3,5,7,9,12,15,17,19,21,24];
const DOUBLE_MARKERS=[12,24];
const NUM_FRETS=24,FRET_H=28,STRING_W=51,LEFT_PAD=28,TOP_PAD=18,NUT_H=10;

function Neck({rootIdx,activeSet,showAll}){
  const svgH=TOP_PAD+NUT_H+NUM_FRETS*FRET_H+24;
  const svgW=LEFT_PAD+6*STRING_W+14;
  const sx=si=>LEFT_PAD+si*STRING_W+STRING_W/2;
  const fy=f=>TOP_PAD+NUT_H+f*FRET_H;

  const renderDot=(si,f,iv)=>{
    const c=IV_COLORS[iv]||{bg:"#888",text:"#fff",border:"#555"};
    const cx=sx(si),cy=f===0?TOP_PAD+NUT_H/2:fy(f-1)+FRET_H/2;
    return(
      <g key={si+"-"+f}>
        <circle cx={cx} cy={cy} r={12} fill={c.bg} stroke={c.border} strokeWidth={1.5}/>
        <text x={cx} y={cy+4} textAnchor="middle" fontSize={9} fontWeight="500" fill={c.text}>{iv}</text>
      </g>
    );
  };

  return(
    <svg width={svgW} height={svgH} style={{display:"block"}}>
      <rect x={LEFT_PAD-4} y={TOP_PAD} width={6*STRING_W+8} height={NUT_H} rx={2} fill="#444"/>
      {Array.from({length:NUM_FRETS+1},(_,f)=>(
        <line key={f} x1={LEFT_PAD-4} x2={LEFT_PAD+6*STRING_W+4} y1={fy(f)} y2={fy(f)} stroke={f===0?"none":"#444"} strokeWidth={0.7}/>
      ))}
      {Array.from({length:NUM_FRETS},(_,f)=>(
        <text key={f} x={LEFT_PAD-8} y={fy(f)+FRET_H/2+4} textAnchor="end" fontSize={11} fill="#999">{f+1}</text>
      ))}
      {FRET_MARKERS.filter(f=>f<=NUM_FRETS).map(f=>{
        const y=fy(f-1)+FRET_H/2;
        if(DOUBLE_MARKERS.includes(f))return[
          LEFT_PAD+2*STRING_W, LEFT_PAD+4*STRING_W
        ].map((cx,i)=>(
          <circle key={f+"-"+i} cx={cx} cy={y} r={3.5} fill="#777" opacity={0.5}/>
        ));
        return<circle key={f} cx={LEFT_PAD+3*STRING_W} cy={y} r={3.5} fill="#777" opacity={0.5}/>;
      })}
      {[0,1,2,3,4,5].map(si=>(
        <line key={si} x1={sx(si)} x2={sx(si)} y1={TOP_PAD+NUT_H} y2={fy(NUM_FRETS)} stroke="#666" strokeWidth={si<2?2:si<4?1.6:1.2} opacity={0.8}/>
      ))}
      {[0,1,2,3,4,5].map(si=>{
        const iv0=getIV(getNoteAtFret(si,0),rootIdx);
        const iv=showAll?iv0:matchIV(iv0,activeSet);
        return iv?renderDot(si,0,iv):null;
      })}
      {Array.from({length:NUM_FRETS},(_,fi)=>{
        const f=fi+1;
        return[0,1,2,3,4,5].map(si=>{
          const iv0=getIV(getNoteAtFret(si,f),rootIdx);
          const iv=showAll?iv0:matchIV(iv0,activeSet);
          return iv?renderDot(si,f,iv):null;
        });
      })}
      {[0,1,2,3,4,5].map(si=>(
        <text key={si} x={sx(si)} y={svgH-4} textAnchor="middle" fontSize={11} fontWeight="500" fill="#999">{STRING_NAMES[si]}</text>
      ))}
    </svg>
  );
}

function App(){
  const [rootIdx,setRootIdx]=useState(9);
  const [rootName,setRootName]=useState("A");
  const [groupKey,setGroupKey]=useState("Triads");
  const [chordKey,setChordKey]=useState("maj");
  const [tab,setTab]=useState("neck");

  const setRoot=(idx,name)=>{setRootIdx(idx);setRootName(name);};

  const allChords=CHORD_GROUPS[groupKey];
  const chord=allChords.find(c=>c.key===chordKey)||allChords[0];
  const activeSet=new Set(chord.intervals);
  const root=rootName;
  const ACC="#c8a96e";

  const rootbtn=(active)=>({
    padding:"4px 0",fontSize:"11px",fontWeight:"500",width:"32px",textAlign:"center",
    borderRadius:"6px",cursor:"pointer",
    background:active?ACC:"#2a2a36",color:active?"#fff":"#e8e6e0",
    border:active?"none":"0.5px solid #444",
  });

  const nbtn=(active)=>({
    padding:"4px 10px",fontSize:"12px",fontWeight:"500",
    borderRadius:"6px",cursor:"pointer",whiteSpace:"nowrap",
    background:active?ACC:"#2a2a36",color:active?"#fff":"#e8e6e0",
    border:active?"none":"0.5px solid #444",
  });

  const LEGEND=[
    {iv:"1",desc:"Grundton (root)"},
    {iv:"b9",desc:"Liten none / liten sekund"},
    {iv:"9",desc:"Stor none / stor sekund"},
    {iv:"b3",desc:"Liten ters (#9)"},
    {iv:"3",desc:"Stor ters"},
    {iv:"4",desc:"Kvart (11)"},
    {iv:"b5",desc:"Förminskad kvint (#11)"},
    {iv:"5",desc:"Ren kvint"},
    {iv:"#5",desc:"Förhöjd kvint (b13)"},
    {iv:"6",desc:"Stor sext (13)"},
    {iv:"b7",desc:"Liten septima"},
    {iv:"maj7",desc:"Stor septima"},
  ];

  return(
    <div className="app">
      <div style={{marginBottom:"16px",borderBottom:"1px solid rgba(255,255,255,0.08)",paddingBottom:"8px",paddingTop:"8px",textAlign:"center"}}>
        <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:"clamp(1.2rem,4vw,1.6rem)",letterSpacing:"4px",color:"#f5f0e8",lineHeight:"1"}}>ACKORDFINNAREN</div>
        <div style={{fontSize:"10px",color:"rgba(240,240,248,0.4)",marginTop:"2px",letterSpacing:"0.05em"}}>by Richard Hauer &amp; Claude</div>
      </div>

      <div style={{fontSize:"10px",color:"#666",textTransform:"uppercase",letterSpacing:".06em",marginBottom:"4px"}}>Grundton</div>
      <div style={{display:"inline-flex",flexDirection:"column",gap:"3px",marginBottom:"12px"}}>
        <div style={{display:"flex",gap:"2px"}}>
          {ALL_NOTES.map((n,i)=>(
            <button key={n} onClick={()=>setRoot(i,n)} style={rootbtn(rootIdx===i&&rootName===n)}>{n}</button>
          ))}
        </div>
        <div style={{display:"flex",gap:"2px"}}>
          {ALL_NOTES.map((n,i)=>{
            const fm={"C#":"Db","D#":"Eb","F#":"Gb","G#":"Ab","A#":"Bb"};
            const flat=fm[n];
            if(flat)return(
              <button key={flat} onClick={()=>setRoot(i,flat)} style={{...rootbtn(rootIdx===i&&rootName===flat),fontSize:"11px",color:(rootIdx===i&&rootName===flat)?"#fff":"#aaa"}}>{flat}</button>
            );
            return<div key={n} style={{width:"32px"}}/>;
          })}
        </div>
      </div>

      <div style={{display:"flex",borderBottom:"1px solid #333",marginBottom:"8px"}}>
        {Object.keys(CHORD_GROUPS).map(g=>(
          <button key={g} onClick={()=>{setGroupKey(g);setChordKey(CHORD_GROUPS[g][0].key);}} style={{
            padding:"7px 14px",fontSize:"12px",fontWeight:groupKey===g?"500":"400",
            background:"transparent",border:"none",cursor:"pointer",
            color:groupKey===g?"#e8e6e0":"#666",
            borderBottom:groupKey===g?"2px solid "+ACC:"2px solid transparent",
          }}>{g}</button>
        ))}
      </div>

      <div style={{display:"flex",flexDirection:"column",gap:"6px",marginBottom:"12px"}}>
        {groupKey==="5-Chords"?(
          [
            {label:"Dur",keys:["maj9","dom9","dom9b5","dom9s5","maj9s5"]},
            {label:"Moll",keys:["min9","minmaj9"]},
            {label:"Moll b5",keys:["min9b5"]},
            {label:"Alt",keys:["dom7b9","dom7s5b9","dom7s5s9"]},
          ].map(({label,keys})=>(
            <div key={label} style={{display:"flex",gap:"6px",alignItems:"center",flexWrap:"wrap"}}>
              <span style={{fontSize:"10px",color:"#666",minWidth:"44px",textTransform:"uppercase",letterSpacing:"0.05em"}}>{label}</span>
              {keys.map(k=>{
                const c=allChords.find(x=>x.key===k);
                if(!c)return null;
                return <button key={c.key} onClick={()=>setChordKey(c.key)} style={nbtn(chordKey===c.key)}>{c.label.replace("X",root)}</button>;
              })}
            </div>
          ))
        ):groupKey==="4-Chords"?(
          [
            {label:"Dur",keys:["maj7","dom7","maj7s5","maj6","add9","dom7sus4"]},
            {label:"Moll",keys:["min7","minmaj7","min6","madd9"]},
            {label:"Dim/b5",keys:["min7b5","dim7"]},
          ].map(({label,keys})=>(
            <div key={label} style={{display:"flex",gap:"6px",alignItems:"center",flexWrap:"wrap"}}>
              <span style={{fontSize:"10px",color:"#666",minWidth:"44px",textTransform:"uppercase",letterSpacing:"0.05em"}}>{label}</span>
              {keys.map(k=>{
                const c=allChords.find(x=>x.key===k);
                if(!c)return null;
                return <button key={c.key} onClick={()=>setChordKey(c.key)} style={nbtn(chordKey===c.key)}>{c.label.replace("X",root)}</button>;
              })}
            </div>
          ))
        ):(
          <div style={{display:"flex",gap:"6px",flexWrap:"wrap"}}>
            {allChords.map(c=>(
              <button key={c.key} onClick={()=>setChordKey(c.key)} style={nbtn(chordKey===c.key)}>{c.label.replace("X",root)}</button>
            ))}
          </div>
        )}
      </div>

      <div style={{display:"flex",gap:"6px",alignItems:"center",flexWrap:"wrap",marginBottom:"10px"}}>
        <span style={{fontSize:"14px",fontWeight:"500",color:"#e8e6e0"}}>{chord.label.replace("X",root)}</span>
        <span style={{color:"#555"}}>–</span>
        {chord.intervals.map(iv=>{
          const c=IV_COLORS[iv]||{bg:"#888",text:"#fff",border:"#555"};
          return(
            <span key={iv} style={{fontSize:"11px",padding:"2px 9px",borderRadius:"99px",background:c.bg,color:c.text,border:"1.5px solid "+c.border,fontWeight:"500"}}>{iv}</span>
          );
        })}
      </div>

      <div style={{display:"flex",borderBottom:"1px solid #333",marginBottom:"10px"}}>
        {[["neck","Hals"],["all","Alla intervall"],["legend","Intervallförklaring"]].map(([k,l])=>(
          <button key={k} onClick={()=>setTab(k)} style={{
            padding:"7px 14px",fontSize:"12px",fontWeight:tab===k?"500":"400",
            background:"transparent",border:"none",cursor:"pointer",
            color:tab===k?"#e8e6e0":"#666",
            borderBottom:tab===k?"2px solid "+ACC:"2px solid transparent",
          }}>{l}</button>
        ))}
      </div>

      {tab==="neck"&&(
        <div className="scroll-wrap"><Neck rootIdx={rootIdx} activeSet={activeSet} showAll={false}/></div>
      )}
      {tab==="all"&&(
        <div>
          <p style={{fontSize:"12px",color:"#666",marginBottom:"8px"}}>Alla 12 intervall från roттonen <strong style={{color:"#e8e6e0"}}>{root}</strong> – oberoende av valt ackord.</p>
          <div className="scroll-wrap"><Neck rootIdx={rootIdx} activeSet={activeSet} showAll={true}/></div>
        </div>
      )}
      {tab==="legend"&&(
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(140px,1fr))",gap:"8px",padding:"8px 0"}}>
          {LEGEND.map(({iv,desc})=>{
            const c=IV_COLORS[iv]||{bg:"#888",text:"#fff",border:"#555"};
            return(
              <div key={iv} style={{display:"flex",alignItems:"center",gap:"8px",padding:"6px 8px",borderRadius:"8px",background:"#2a2a36",border:"0.5px solid #3a3a48"}}>
                <div style={{width:"28px",height:"28px",borderRadius:"50%",flexShrink:0,background:c.bg,border:"1.5px solid "+c.border,display:"flex",alignItems:"center",justifyContent:"center"}}>
                  <span style={{fontSize:"9px",fontWeight:"700",color:c.text}}>{iv}</span>
                </div>
                <div>
                  <div style={{fontSize:"12px",fontWeight:"500",color:"#e8e6e0"}}>{iv}</div>
                  <div style={{fontSize:"10px",color:"#888",lineHeight:"1.3"}}>{desc}</div>
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
