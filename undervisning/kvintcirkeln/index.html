<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kvintcirkeln</title>
  <style>* { margin: 0; padding: 0; box-sizing: border-box; }</style>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useCallback } = React;

    const NOTES = ["C", "G", "D", "A", "E", "B", "F♯/G♭", "D♭", "A♭", "E♭", "B♭", "F"];
    const MINOR = ["Am", "Em", "Bm", "F♯m", "C♯m", "G♯m", "D♯m/E♭m", "B♭m", "Fm", "Cm", "Gm", "Dm"];
    const SHARPS = ["0", "1", "2", "3", "4", "5", "6♯/6♭", "5♭", "4♭", "3♭", "2♭", "1♭"];
    const DIATONIC_INDICES = [11, 0, 1, 2, 3, 4, 5];
    const ROMAN_FUNCTIONS = ["IV", "I", "V", "II", "VI", "III", "VII"];
    const GERMAN_FUNCTIONS = ["S", "T", "D", "Sp", "Tp", "Dp", "°VII"];

    function QuintCircle() {
      const [rotation, setRotation] = useState(0);
      const [activeNote, setActiveNote] = useState(0);

      const handleNoteClick = useCallback((index) => {
        setActiveNote(index);
        setRotation(-index * 30);
      }, []);

      const toRad = (deg) => (deg * Math.PI) / 180;
      const cx = 200, cy = 200;
      const outerR = 185, mid1R = 148, mid2R = 112, innerR = 76;
      const shardStartDeg = -45, shardEndDeg = 165;

      function polarToCart(angleDeg, r) {
        const a = toRad(angleDeg - 90);
        return { x: cx + r * Math.cos(a), y: cy + r * Math.sin(a) };
      }

      function arcPath(startDeg, endDeg, r1, r2) {
        const s1 = polarToCart(startDeg, r1);
        const e1 = polarToCart(endDeg, r1);
        const s2 = polarToCart(startDeg, r2);
        const e2 = polarToCart(endDeg, r2);
        const large = endDeg - startDeg > 180 ? 1 : 0;
        return `M ${s1.x} ${s1.y} A ${r1} ${r1} 0 ${large} 1 ${e1.x} ${e1.y} L ${e2.x} ${e2.y} A ${r2} ${r2} 0 ${large} 0 ${s2.x} ${s2.y} Z`;
      }

      function segmentPath(startDeg, endDeg, r1, r2) {
        const s1 = polarToCart(startDeg, r1);
        const e1 = polarToCart(endDeg, r1);
        const s2 = polarToCart(startDeg, r2);
        const e2 = polarToCart(endDeg, r2);
        return `M ${s1.x} ${s1.y} A ${r1} ${r1} 0 0 1 ${e1.x} ${e1.y} L ${e2.x} ${e2.y} A ${r2} ${r2} 0 0 0 ${s2.x} ${s2.y} Z`;
      }

      function labelPos(midDeg, r) {
        return polarToCart(midDeg, r);
      }

      function getShardNote(functionIndex) {
        const offsets = [11, 0, 1, 2, 3, 4, 5];
        return (activeNote + offsets[functionIndex]) % 12;
      }

      return (
        <div style={{
          minHeight: "100vh",
          background: "radial-gradient(ellipse at center, #1a1208 0%, #0d0a04 100%)",
          display: "flex",
          flexDirection: "column",
          alignItems: "center",
          justifyContent: "center",
          fontFamily: "'Georgia', serif",
          padding: "20px"
        }}>
          <h1 style={{ color: "#c9a84c", fontSize: "1.4rem", letterSpacing: "0.3em", textTransform: "uppercase", marginBottom: "8px", fontWeight: 400 }}>Kvintcirkeln</h1>
          <p style={{ color: "#7a6535", fontSize: "0.75rem", marginBottom: "24px", letterSpacing: "0.1em" }}>
            Klicka på en ton för att centrera den · Grundton: <strong style={{ color: "#c9a84c" }}>{NOTES[activeNote]}</strong>
          </p>
          <svg width="460" height="460" viewBox="-30 -30 460 460">
            <defs>
              <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stopColor="#2a1f0a" />
                <stop offset="100%" stopColor="#141007" />
              </radialGradient>
              <filter id="glow">
                <feGaussianBlur stdDeviation="2" result="coloredBlur" />
                <feMerge><feMergeNode in="coloredBlur" /><feMergeNode in="SourceGraphic" /></feMerge>
              </filter>
            </defs>
            <circle cx={cx} cy={cy} r={outerR} fill="url(#bgGrad)" stroke="#4a3820" strokeWidth="1.5" />
            <g transform={`rotate(${rotation}, ${cx}, ${cy})`} style={{ transition: "transform 0.5s cubic-bezier(0.34,1.56,0.64,1)" }}>
              {NOTES.map((note, i) => {
                const startDeg = i * 30 - 15;
                const endDeg = i * 30 + 15;
                const midDeg = i * 30;
                const isActive = i === activeNote;
                const p1 = labelPos(midDeg, (outerR + mid1R) / 2);
                const p2 = labelPos(midDeg, (mid1R + mid2R) / 2);
                const p3 = labelPos(midDeg, (mid2R + innerR) / 2);
                return (
                  <g key={i} onClick={() => handleNoteClick(i)} style={{ cursor: "pointer" }}>
                    <path d={segmentPath(startDeg, endDeg, outerR - 1, mid1R + 1)} fill={isActive ? "#3d2a08" : "#1e1508"} stroke={isActive ? "#c9a84c" : "#4a3820"} strokeWidth={isActive ? 1.5 : 0.8} />
                    <text x={p1.x} y={p1.y} transform={`rotate(${-rotation}, ${p1.x}, ${p1.y})`} textAnchor="middle" dominantBaseline="central" fill={isActive ? "#f0d078" : "#c9a84c"} fontSize={note.includes("♯") || note.includes("♭") ? "10" : "13"} fontWeight={isActive ? "bold" : "normal"} filter={isActive ? "url(#glow)" : ""} style={{ userSelect: "none" }}>{note}</text>
                    <path d={segmentPath(startDeg, endDeg, mid1R, mid2R + 1)} fill={isActive ? "#2a1f08" : "#181208"} stroke="#3a2c14" strokeWidth="0.6" />
                    <text x={p2.x} y={p2.y} transform={`rotate(${-rotation}, ${p2.x}, ${p2.y})`} textAnchor="middle" dominantBaseline="central" fill={isActive ? "#d4956a" : "#8a6545"} fontSize="9.5" style={{ userSelect: "none" }}>{MINOR[i]}</text>
                    <path d={segmentPath(startDeg, endDeg, mid2R, innerR + 1)} fill={isActive ? "#1f1808" : "#130f06"} stroke="#2e2410" strokeWidth="0.6" />
                    <text x={p3.x} y={p3.y} transform={`rotate(${-rotation}, ${p3.x}, ${p3.y})`} textAnchor="middle" dominantBaseline="central" fill={isActive ? "#a09060" : "#5a4830"} fontSize="9" style={{ userSelect: "none" }}>{SHARPS[i]}</text>
                  </g>
                );
              })}
              <circle cx={cx} cy={cy} r={innerR} fill="#0d0a04" stroke="#3a2c14" strokeWidth="1" />
            </g>
            <path d={arcPath(shardStartDeg, shardEndDeg, outerR + 18, outerR + 2)} fill="rgba(20,10,0,0.85)" stroke="#7a5a2a" strokeWidth="1" />
            <path d={arcPath(shardStartDeg, shardEndDeg, outerR + 36, outerR + 20)} fill="rgba(10,8,0,0.85)" stroke="#5a4020" strokeWidth="1" />
            {ROMAN_FUNCTIONS.map((roman, fi) => {
              const angleDeg = shardStartDeg + fi * 30;
              const midDeg = angleDeg + 15;
              const isTonicFunc = fi === 1;
              const outerShardMid = (outerR + 2 + outerR + 18) / 2;
              const innerShardMid = (outerR + 20 + outerR + 36) / 2;
              return (
                <g key={fi}>
                  <text x={labelPos(midDeg, outerShardMid).x} y={labelPos(midDeg, outerShardMid).y} textAnchor="middle" dominantBaseline="central" fill={isTonicFunc ? "#f0d078" : "#c9a84c"} fontSize="9" fontWeight={isTonicFunc ? "bold" : "normal"} style={{ userSelect: "none" }}>{GERMAN_FUNCTIONS[fi]}</text>
                  <text x={labelPos(midDeg, innerShardMid).x} y={labelPos(midDeg, innerShardMid).y} textAnchor="middle" dominantBaseline="central" fill={isTonicFunc ? "#e8c870" : "#a08040"} fontSize="8.5" fontWeight={isTonicFunc ? "bold" : "normal"} style={{ userSelect: "none" }}>{roman}</text>
                </g>
              );
            })}
            {[0, 1, 2, 3, 4, 5, 6, 7].map(i => {
              const angle = shardStartDeg + i * 30;
              const p1 = polarToCart(angle, outerR + 2);
              const p2 = polarToCart(angle, outerR + 36);
              return <line key={i} x1={p1.x} y1={p1.y} x2={p2.x} y2={p2.y} stroke="#4a3820" strokeWidth="0.6" />;
            })}
            <path d={`M ${polarToCart(shardStartDeg, outerR + 20).x} ${polarToCart(shardStartDeg, outerR + 20).y} A ${outerR + 20} ${outerR + 20} 0 1 1 ${polarToCart(shardEndDeg, outerR + 20).x} ${polarToCart(shardEndDeg, outerR + 20).y}`} fill="none" stroke="#5a4020" strokeWidth="0.6" />
            <polygon points={`${cx},${cy - outerR - 44} ${cx - 4},${cy - outerR - 36} ${cx + 4},${cy - outerR - 36}`} fill="#c9a84c" opacity="0.8" />
            <text x={cx} y={cy - 10} textAnchor="middle" fill="#c9a84c" fontSize="22" fontWeight="bold" filter="url(#glow)" style={{ userSelect: "none" }}>{NOTES[activeNote]}</text>
            <text x={cx} y={cy + 10} textAnchor="middle" fill="#7a6535" fontSize="10" style={{ userSelect: "none" }}>{MINOR[activeNote]}</text>
          </svg>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<QuintCircle />);
  </script>
</body>
</html>
